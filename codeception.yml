actor: Tester
paths:
    tests: tests
    log: tests/_output
    data: tests/_data
    support: tests/_support
    envs: tests/_envs
bootstrap: _bootstrap.php
params:
    - tests/.env
modules:
    config:
        \craft\test\Craft:
            configFile: 'tests/_craft/config/test.php'
            entryUrl: 'https://craft3-plugindev.test/index.php'
            entryScript: 'index.php'
            projectConfig: {}
            migrations: []
            cleanup: true
            transaction: false
            dbSetup: {clean: false, setupCraft: false}