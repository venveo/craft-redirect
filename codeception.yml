actor: Tester
paths:
    tests: tests
    log: tests/_output
    data: tests/_data
    support: tests/_support
    envs: tests/_envs
bootstrap: _bootstrap.php
params:
    - tests/.env
modules:
    config:
        \craft\test\Craft:
            configFile: 'tests/_craft/config/test.php'
            entryUrl: 'https://craft3-plugindev.test/index.php'
            entryScript: 'index.php'
            projectConfig: {}
            migrations: []
            plugins:
                vredirect:
                    class: '\venveo\redirect\Plugin'
                    handle: vredirect
            cleanup: false
            transaction: true
            dbSetup: {clean: true, setupCraft: true}